name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, dev]

jobs:
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t plm-backend:ci ./backend

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npm run type-check || npx tsc --noEmit
        working-directory: frontend
        continue-on-error: true

      - name: Build
        run: npm run build
        working-directory: frontend

  build-conversion:
    name: Build Conversion Service Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true  # 拉取 Git LFS 中的 wheels

      - name: Build conversion Docker image
        run: docker build -f Dockerfile.jvm -t plm-conversion:ci ./conversion
