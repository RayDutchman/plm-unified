services:
  # ── 数据库 ──────────────────────────────────────────────
  db:
    image: postgres:16
    container_name: plm_db
    environment:
      POSTGRES_DB: plm_unified
      POSTGRES_USER: plm
      POSTGRES_PASSWORD: plmpass
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plm -d plm_unified"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 缓存 ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: plm_redis
    ports:
      - "6379:6379"

  # ── Zookeeper（Kafka 依赖）───────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: plm_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ── Kafka ───────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: plm_kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  # ── Elasticsearch ────────────────────────────────────────
  es:
    image: elasticsearch:8.11.0
    container_name: plm_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  # ── FastAPI 后端 ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plm_backend
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://plm:plmpass@db:5432/plm_unified
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: change-this-in-production
      VAULT_PATH: /vault
    volumes:
      - vault_data:/vault
    ports:
      - "8000:8000"

  # ── CAD 转换服务 ─────────────────────────────────────────
  conversion:
    build:
      context: ./conversion
    container_name: plm_conversion
    depends_on:
      - kafka
      - backend
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      BACKEND_URL: http://backend:8000
    volumes:
      - vault_data:/vault

volumes:
  db_data:
  es_data:
  vault_data:
